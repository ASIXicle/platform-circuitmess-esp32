[env:chatter2]
platform = /home/tuttle/Documents/CHATTERTRIS/platform-circuitmess-esp32
board = chatter2
framework = arduino
monitor_speed = 115200
upload_port = /dev/ttyUSB0
upload_speed = 115200
lib_ldf_mode = deep+

lib_ignore =
    ArduinoJson
    ArduinoOTA
    Armstrong-Library
    AsyncTCP
    AsyncUDP
    AzureIoT
    BatController-Library
    Batmobile-Common
    Batmobile-Library
    ByteBoi-Library
    Chatter-Library
    CircuitMess-Audio
    CircuitPet-Library
    Clockstar-Library
    cpp-properties
    DNSServer
    ESP8266Audio
    ESP32Ping
    ESPmDNS
    FDK-AAC
    glm
    heatshrink
    HTTPClient
    HTTPUpdate
    I2C_BM8563
    JayD-Library
    JPEGDEC
    JPEGDecoder
    lvgl
    NetBIOS
    NTPClient
    OpenCV-ESP32
    ResponsiveAnalogRead
    Ringo
    SerialFlash
    SimpleBLE
    SparkFun_LSM6DS3
    Spencer-Library
    Synthia-Library
    TFT_eSPI
    TJpg_Decoder
    U8g2_for_TFT_eSPI
    Update
    VEML6040
    WebServer
    Wheelson-Library
    WiFiClientSecure
    XT_DAC_Audio

board_build.bootloader = ~/Documents/CHATTERTRIS/arduino_bootloader.bin
board_build.partitions = no_ota.csv
board_build.flash_mode = dio
board_build.f_flash = 40000000L
board_build.f_cpu = 240000000L

build_flags =
    -DCONFIG_ARDUINO_LOOP_STACK_SIZE=14000
    -DCIRCUITOS_FREERTOS
    -DCIRCUITOS_NVS
    -DCIRCUITOS_PIEZO_PWM
    -DCIRCUITOS_PIEZO_PWM_CHANNEL=15
    -DCIRCUITOS_LOVYANGFX
    -DLOVYAN_PANEL=Panel_ST7735S
    -DLOVYAN_FREQ=27000000
    -DLOVYAN_WIDTH=128
    -DLOVYAN_HEIGHT=160
    -DLOVYAN_MISO=-1
    -DLOVYAN_MOSI=26
    -DLOVYAN_SCK=27
    -DLOVYAN_CS=-1
    -DLOVYAN_DC=33
    -DLOVYAN_RST=15
    -DRADIOLIB_GODMODE
    -DLV_FONT_MONTSERRAT_8=1
    -DLV_FONT_MONTSERRAT_14=1
    -DLV_FONT_MONTSERRAT_10=1
    -DLV_FONT_UNSCII_8=1
    -DLV_USE_GIF=1
    -Wno-error=reorder
    -std=gnu++14