; =============================================================================
; CrowS — PlatformIO Configuration
; Custom FOSS OS for CircuitMess Chatter 2.0
;
; Platform: circuitmess-esp32 (CM Arduino-ESP32 v1.8.3 fork, ESP-IDF 3.x)
; Board:    chatter2 (ESP32-D0WD, 4MB flash, ST7735S display)
; =============================================================================

[env:chatter2]
platform = circuitmess-esp32
board = chatter2
framework = arduino

monitor_speed = 115200
upload_port = /dev/ttyUSB0
upload_speed = 115200

; Use no_ota partition table (maximizes app space)
board_build.partitions = no_ota.csv

; Build flags from CircuitMess boards.txt (chatter2.build.defines)
build_flags =
    -DCONFIG_ARDUINO_LOOP_STACK_SIZE=14000
    -DCIRCUITOS_FREERTOS
    -DCIRCUITOS_NVS
    -DCIRCUITOS_PIEZO_PWM
    -DCIRCUITOS_PIEZO_PWM_CHANNEL=15
    -DCIRCUITOS_LOVYANGFX
    -DLOVYAN_PANEL=Panel_ST7735S
    -DLOVYAN_FREQ=27000000
    -DLOVYAN_WIDTH=128
    -DLOVYAN_HEIGHT=160
    -DLOVYAN_MISO=-1
    -DLOVYAN_MOSI=26
    -DLOVYAN_SCK=27
    -DLOVYAN_CS=-1
    -DLOVYAN_DC=33
    -DLOVYAN_RST=15
    -DRADIOLIB_GODMODE
    -DLV_FONT_MONTSERRAT_8=1
    -DLV_FONT_MONTSERRAT_14=1
    -DLV_FONT_MONTSERRAT_10=1
    -DLV_FONT_UNSCII_8=1
    -DLV_USE_GIF=1
